name: 'Audit action'
description: 'Audits dependencies for vulnerabilities'
author: 'Taskworld'
inputs:
  package-name:
    description: 'name of the service or package'
  failure-level:
    description: 'Severity level causing audit to fail'
    default: 'low'
  package-manager:
    description: 'Package manager (pnpm or yarn)'
    default: 'pnpm'
  path:
    description: 'Target path for the audit'
  include-dev-deps:
    description: 'Include devDependencies in the audit'
    default: 'false'
  detailed-report:
    description: 'Include a 3rd column listing affected packages per severity'
    default: 'false'
outputs:
  vulnerabilities:
    description: 'Rendered vulnerability report (markdown)'
  failed:
    description: 'Set to true when vulnerabilities exceed failure-level'
runs:
  using: 'node24'
  main: 'dist/index.js'
